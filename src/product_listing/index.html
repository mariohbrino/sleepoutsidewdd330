<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Product Make and Name</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/ProductListing.js" type="module"></script>
  </head>

  <body>
    <header id="header" class="divider"></header>

    <main class="divider">
      <h2 id="top-products">Top Products</h2>
      <ul class="category-list">
        <li>
          <a href="../product_listing/?category=tents">
            <img src="/images/category-tents.svg" alt="Tents" />

          </a>
        </li>
        <li>
          <a href="../product_listing/?category=backpacks">
            <img src="/images/category-backpacks.svg" alt="Backpacks" />
            <p>Backpacks</p>
          </a>
        </li>
        <li>
          <a href="../product_listing/?category=sleeping-bags">
            <img src="/images/category-sleepingbags.svg" alt="Sleeping Bags" />
            <p>Sleeping Bags</p>
          </a>
        </li>
        <li>
          <a href="../product_listing/?category=hammocks">
            <img src="/images/category-hammocks.svg" alt="Hammocks" />
            <p>Hammocks</p>
          </a>
        </li>
      </ul>
      <section id="product-list" class="product-list"></section>
    </main>

    <footer id="footer"></footer>
  </body>
</html>
