<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product List</title>
    <!-- Link your CSS here, e.g., <link rel="stylesheet" href="../css/style.css"> -->
  </head>
  <body>
    <!-- Keep your existing header component here -->
    <header>
      <!-- Your header content -->
    </header>

    <main class="divider">
      <!-- This is the container for your product list -->
      <section class="products">
        <h2 id="category-title">Products</h2>
        <ul class="product-list" id="product-list">
          <!-- JavaScript will inject the product cards here -->
        </ul>
      </section>
    </main>

    <!-- Keep your existing footer component here -->
    <footer>
      <!-- Your footer content -->
    </footer>
  </body>
</html>
